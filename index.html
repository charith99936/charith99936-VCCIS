const PROFICIENCY = ["Beginner","Intermediate","Advanced"];
const PROF_WEIGHT = { Beginner:0.4, Intermediate:0.7, Advanced:1.0 };
const CAT_ACCENT  = { Programming:"#9B72CF", DSA:"#A87ED6", Systems:"#8B6FC4", Theory:"#7B5FBF", Data:"#B48AE0", Mathematics:"#C49DE8", Emerging:"#9D80D4", Security:"#8578C0", Cloud:"#B09BD9" };

function computeRoles(selected) {
  const codes = Object.keys(selected);
  if (!codes.length) return { strong:[], eligible:[], gaps:{} };
  const avgW = codes.reduce((s,c)=>s+(PROF_WEIGHT[selected[c]]||0),0)/codes.length;
  const strong=[],eligible=[],gaps={};
  ROLES.forEach((role)=>{
    const reqMet=role.required.every((r)=>codes.includes(r));
    const bonusMet=role.bonus.filter((b)=>codes.includes(b));
    const missing=role.required.filter((r)=>!codes.includes(r));
    const score=((reqMet?0.6:0)+(bonusMet.length/Math.max(role.bonus.length,1))*0.4)*avgW;
    if(reqMet&&score>=0.45) strong.push({...role,score:Math.round(score*100)});
    else if(reqMet||(missing.length===1&&bonusMet.length>=1)){
      eligible.push({...role,score:Math.round(score*80)});
      gaps[role.id]={missing:missing.map((c)=>COURSES.find((x)=>x.code===c)?.name||c),bonus:role.bonus.filter((b)=>!codes.includes(b)).slice(0,2).map((c)=>COURSES.find((x)=>x.code===c)?.name||c)};
    }
  });
  return {strong:strong.sort((a,b)=>b.score-a.score),eligible:eligible.sort((a,b)=>b.score-a.score).slice(0,5),gaps};
}
function computeSkills(selected) {
  const map={};
  Object.entries(selected).forEach(([code,prof])=>{(COURSE_SKILLS[code]||[]).forEach((s)=>{map[s]=Math.max(map[s]||0,PROF_WEIGHT[prof]||0.5);});});
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,16);
}

/* ─────────────────────────── SCROLL REVEAL HOOK ─────────────────────────── */
function useReveal(delay=0) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVis(true); }, { threshold: 0.08 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, vis, delay];
}

function Reveal({ children, delay = 0, style = {} }) {
  const [ref, vis] = useReveal();
  return (
    <div ref={ref} style={{
      opacity: vis ? 1 : 0,
      transform: vis ? "translateY(0)" : "translateY(28px)",
      transition: `opacity 0.65s cubic-bezier(.4,0,.2,1) ${delay}ms, transform 0.65s cubic-bezier(.4,0,.2,1) ${delay}ms`,
      ...style
    }}>
      {children}
    </div>
  );
}

/* ─────────────────────────── LINKEDIN HELPERS ─────────────────────────── */
function parseLinkedInUrl(raw) {
  // Accept: full URL, /in/slug, or bare slug
  const match = raw.trim().match(/linkedin\.com\/in\/([^/?#\s]+)/i) || raw.trim().match(/^([a-z0-9-]+)$/i);
  return match ? match[1].toLowerCase() : null;
}
function slugToName(slug) {
  return slug.replace(/-/g," ").replace(/\b\w/g,c=>c.toUpperCase());
}

              <button onClick={()=>setMode("choose")} style={{ fontSize:13,color:T.textMuted,background:"none",border:"none",cursor:"pointer",padding:0,marginBottom:20,display:"flex",alignItems:"center",gap:4,fontFamily:"'Sora',sans-serif" }}>← Back</button>

              <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
                {[["FULL NAME","text","Charith Reddy",name,setName],["EMAIL","email","you@vit.ac.in",email,()=>{}]].map(([lbl,type,ph,val,set])=>(
                  <div key={lbl}>
                    <label style={{ fontSize:12,fontWeight:600,color:T.textSub,letterSpacing:"0.05em",display:"block",marginBottom:6 }}>{lbl}</label>
                    <input value={val} onChange={e=>lbl==="FULL NAME"?setName(e.target.value):null} placeholder={ph} type={type} style={{ width:"100%",padding:"11px 14px",border:`1.5px solid ${T.border}`,borderRadius:8,fontSize:14,fontFamily:"'Sora',sans-serif",color:T.text,background:T.bg,outline:"none",transition:"border-color .14s" }} onFocus={e=>e.target.style.borderColor=T.accentBorder} onBlur={e=>e.target.style.borderColor=T.border} onKeyDown={e=>{if(e.key==="Enter")handleManual();}}/>
                  </div>
                ))}
                <button onClick={handleManual} disabled={manualPhase==="loading"} style={{ marginTop:4,padding:"13px",background:manualPhase==="done"?T.green:T.accent,color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:manualPhase==="loading"?"not-allowed":"pointer",transition:"background .2s",fontFamily:"'Sora',sans-serif" }}>
                  {manualPhase==="idle"?"Start Mapping →":manualPhase==="loading"?"Setting up…":"✓ Let's go!"}
                </button>
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

            <div>

              </div>
              {/* Horizontal scroll */}
              <div ref={scrollRef} style={{ display: "flex", gap: 14, overflowX: "auto", paddingBottom: 12, scrollSnapType: "x mandatory", cursor: "grab", WebkitOverflowScrolling: "touch" }}
                onMouseDown={e => { scrollRef.current._startX = e.clientX; scrollRef.current._scrollLeft = scrollRef.current.scrollLeft; scrollRef.current.style.cursor = "grabbing"; }}
                onMouseMove={e => { if (!scrollRef.current._startX) return; scrollRef.current.scrollLeft = scrollRef.current._scrollLeft - (e.clientX - scrollRef.current._startX); }}
                onMouseUp={() => { scrollRef.current._startX = null; scrollRef.current.style.cursor = "grab"; }}
                onMouseLeave={() => { scrollRef.current._startX = null; scrollRef.current.style.cursor = "grab"; }}>
                {UDEMY_COURSES.filter(u => u.badge === "Bestseller" && !selected[u.relatedCode]).slice(0, 8).map((course, i) => (
                  <div key={course.id} style={{ minWidth: 280, background: T.bg, border: `1px solid ${T.border}`, borderRadius: 14, overflow: "hidden", scrollSnapAlign: "start", transition: "all .18s", flexShrink: 0 }}

                    onMouseLeave={e => { e.currentTarget.style.borderColor = T.border; e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; }}>
                    <div style={{ height: 4, background: `linear-gradient(90deg,${course.color},${course.color}77)` }} />
                    <div style={{ padding: "1.25rem" }}>
                      <div style={{ display: "flex", gap: 5, marginBottom: 10, flexWrap: "wrap" }}>
                        {course.badge && <span style={{ fontSize: 9, fontWeight: 700, background: "#FEF9C3", color: "#92400E", padding: "2px 7px", borderRadius: 3, border: "1px solid #FDE68A" }}>{course.badge}</span>}
                        <span style={{ fontSize: 9, background: "#FFF7ED", color: "#C2410C", padding: "2px 7px", borderRadius: 3, fontWeight: 600, border: "1px solid #FED7AA" }}>Gap</span>
                        <span style={{ fontSize: 9, background: T.surface2, color: T.textSub, padding: "2px 7px", borderRadius: 3, fontWeight: 500 }}>{course.hours}h · {course.level}</span>
                      </div>
                      <div style={{ fontWeight: 700, fontSize: 14, color: T.text, lineHeight: 1.35, marginBottom: 6, letterSpacing: "-0.01em" }}>{course.title}</div>
                      <div style={{ fontSize: 12, color: T.textMuted, marginBottom: 12 }}>{course.instructor}</div>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                        <div>
                          <StarRating rating={course.rating} />
                          <div style={{ fontSize: 10, color: T.textMuted, marginTop: 2 }}>({course.reviews})</div>
                        </div>
                        <a href={course.link} target="_blank" rel="noreferrer" style={{ fontSize: 12, fontWeight: 600, color: "#fff", background: "#E05936", borderRadius: 6, padding: "6px 14px", textDecoration: "none" }}>Enrol ↗</a>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </Reveal>
        </div>
      </div>

    </div>
  );
}

/* ─────────────────────────── MAIN APP ─────────────────────────── */
function App() {

  const [jobFilter, setJobFilter] = useState("All");
  const [mounted, setMounted] = useState(false);
  const [linkedIn, setLinkedIn] = useState(null); // LinkedIn profile state
  const [jobExpand, setJobExpand] = useState(null); // expanded job id
  const [roleExpand, setRoleExpand] = useState(null); // expanded role id
  const [liModal, setLiModal] = useState(false);
  const [liEmail2, setLiEmail2] = useState("");
  const [liPhase2, setLiPhase2] = useState("idle");

  useEffect(() => { setTimeout(() => setMounted(true), 50); }, []);

  const { strong, eligible, gaps } = useMemo(() => computeRoles(selected), [selected]);
  const skills = useMemo(() => computeSkills(selected), [selected]);
  const count = Object.keys(selected).length;
  const eligibleIds = [...strong, ...eligible].map(r => r.id);

  const filtered = COURSES.filter(c => (cat === "All" || c.category === cat) && (c.name.toLowerCase().includes(search.toLowerCase()) || c.code.toLowerCase().includes(search.toLowerCase())));
  const filteredJobs = JOBS.filter(j => j.region === "India" && (jobFilter === "All" || j.type === jobFilter) && (eligibleIds.length === 0 || j.roles.some(r => eligibleIds.includes(r))));
  const filteredUdemy = UDEMY_COURSES.filter(u => {
    const catMatch = udemyCat === "All" || u.category === udemyCat;
    // Only show Udemy courses for subjects the user hasn't selected yet (gap-filling)
    // If no courses selected at all, show everything so the page isn't empty
    const isGap = count === 0 || !selected[u.relatedCode];
    return catMatch && isGap;

  const toggle = (code) => setSelected(p => { if (p[code]) { const n = { ...p }; delete n[code]; return n; } return { ...p, [code]: "Intermediate" }; });

    .cp{transition:border-color .12s,background .12s,color .12s;}.cp:hover{border-color:${T.accentBorder}!important;color:${T.accent}!important;background:${T.accentSoft}!important;}

                <span style={{ fontSize: 12, color: "#0A66C2", fontWeight: 600 }}>{linkedIn.name.split(" ")[0]}</span>

            <div style={{ width: 28, height: 28, borderRadius: "50%", background: "#1A1825", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "#fff" }}>{userName[0].toUpperCase()}</div>

                <div style={{ display: "flex", alignItems: "flex-start", gap: 8, padding: "10px 12px", background: "#F0F9FF", borderRadius: 6, border: "1px solid #BAE6FD", marginBottom: 16 }}>

              </>
            )}
            {liPhase2 === "loading" && <div style={{ textAlign: "center", padding: "2rem 0" }}><div style={{ width: 40, height: 40, border: "3px solid #DBEAFE", borderTopColor: "#0A66C2", borderRadius: "50%", margin: "0 auto 14px", animation: "spin 0.8s linear infinite" }} /><div style={{ fontSize: 13, color: T.textSub }}>Connecting… your LinkedIn is opening in a new tab</div></div>}
            {liPhase2 === "done" && <div style={{ textAlign: "center", padding: "2rem 0" }}><div style={{ fontSize: 32, marginBottom: 10 }}>✅</div><div style={{ fontWeight: 700, color: T.text, fontSize: 16 }}>Connected!</div></div>}
          </div>
        </div>
      )}

      {/* STATUS BAR */}
      {count > 0 && (
        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(255,255,255,0.97)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", borderTop: `1px solid #E8E8EC`, padding: "10px 2rem" }}>
          <div style={{ maxWidth: 1280, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", gap: 20 }}>
              {[{ val: count, lbl: "courses", c: T.accent }, { val: skills.length, lbl: "skills", c: "#0EA5E9" }, { val: strong.length, lbl: "strong matches", c: T.green }, { val: filteredJobs.length, lbl: "jobs", c: "#6B7280" }].map(({ val, lbl, c }) => (
                <span key={lbl} style={{ fontSize: 11, color: "#9CA3AF", fontFamily: "'DM Mono',monospace" }}>
                  <span style={{ color: c, fontWeight: 600 }}>{val}</span> {lbl}
                </span>
              ))}
            </div>
            <div style={{ display: "flex", gap: 4 }}>
              {[{ id: "roles", label: "Roles" }, { id: "jobs", label: "Jobs" }, { id: "udemy", label: "Fill gaps" }].map(t => (
                <button key={t.id} onClick={() => setTab(t.id)} style={{ padding: "5px 12px", fontSize: 11, fontWeight: 600, background: tab === t.id ? "#1A1825" : T.surface, color: tab === t.id ? "#fff" : T.textSub, border: `1px solid ${tab === t.id ? "#1A1825" : T.border}`, borderRadius: 4, cursor: "pointer", fontFamily: "'Sora',sans-serif" }}>{t.label} →</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
